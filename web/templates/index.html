<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dylan Bot - Panel de Control</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-music"></i>
                    <h1>Dylan Bot</h1>
                </div>
                <div class="status-indicator" id="connection-status">
                    <span class="status-dot"></span>
                    <span class="status-text">Conectando...</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Guild Selector -->
            <section class="guild-selector" id="guild-selector">
                <h2><i class="fas fa-server"></i> Seleccionar Servidor</h2>
                <div class="guilds-grid" id="guilds-list">
                    <div class="loading">Cargando servidores...</div>
                </div>
            </section>

            <!-- Control Panel (hidden by default) -->
            <section class="control-panel" id="control-panel" style="display: none;">
                <!-- Current Guild Info -->
                <div class="guild-info">
                    <button class="btn-back" id="btn-back">
                        <i class="fas fa-arrow-left"></i> Volver
                    </button>
                    <h2 id="current-guild-name">Servidor</h2>
                    <span class="connection-badge" id="voice-status">Desconectado</span>
                </div>

                <!-- Player Card -->
                <div class="player-card">
                    <div class="now-playing">
                        <h3><i class="fas fa-headphones"></i> Reproduciendo Ahora</h3>
                        <div class="song-info" id="current-song">
                            <div class="song-thumbnail">
                                <i class="fas fa-music"></i>
                            </div>
                            <div class="song-details">
                                <span class="song-title">No hay reproducción</span>
                                <span class="song-artist">-</span>
                            </div>
                        </div>
                    </div>

                    <!-- Player Controls -->
                    <div class="player-controls">
                        <button class="control-btn" id="btn-skip" title="Saltar">
                            <i class="fas fa-forward"></i>
                        </button>
                        <button class="control-btn" id="btn-pause" title="Pausar/Reanudar">
                            <i class="fas fa-pause"></i>
                        </button>
                        <button class="control-btn" id="btn-stop" title="Limpiar cola">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>

                    <!-- Volume Control -->
                    <div class="volume-control">
                        <i class="fas fa-volume-down"></i>
                        <input type="range" min="0" max="100" value="50" class="volume-slider" id="volume-slider">
                        <i class="fas fa-volume-up"></i>
                        <span class="volume-value" id="volume-value">50%</span>
                    </div>
                </div>

                <!-- Add Song -->
                <div class="add-song">
                    <h3><i class="fas fa-plus-circle"></i> Agregar Canción</h3>
                    <div class="input-group">
                        <input type="text" id="song-url" placeholder="URL de YouTube...">
                        <button class="btn-primary" id="btn-play">
                            <i class="fas fa-play"></i> Reproducir
                        </button>
                    </div>
                    <label class="checkbox-label">
                        <input type="checkbox" id="is-playlist">
                        <span>Es playlist</span>
                    </label>
                </div>

                <!-- Queue -->
                <div class="queue-section">
                    <div class="queue-header">
                        <h3><i class="fas fa-list"></i> Cola de Reproducción</h3>
                        <span class="queue-count" id="queue-count">0 canciones</span>
                    </div>
                    <div class="queue-list" id="queue-list">
                        <div class="empty-queue">La cola está vacía</div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Panel de Control Dylan Bot - Creado por Daeoro</p>
        </footer>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
